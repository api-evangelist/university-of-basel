---
aid: university-of-basel
name: University of Basel
description: >-
  The University of Basel (Universität Basel) is the oldest university in
  Switzerland, founded in 1460, and is ranked #85 in the QS World University
  Rankings 2025. Its public, machine-readable developer footprint is concentrated
  in scholarly and research infrastructure rather than a single central developer
  portal. The university operates "edoc", its open-access institutional repository
  running DSpace-CRIS 7.6.2, which exposes a public DSpace REST API and an
  OAI-PMH 2.0 metadata interface. The Swiss National Data and Service Center for
  the Humanities (DaSCH), hosted at the University of Basel, develops and operates
  the DSP-API, an open-source RDF-based humanities research data API. Library
  discovery is delivered through the SLSP swisscovery (Alma/Primo) platform, which
  offers a standards-based SRU search interface for the Basel institution zone.
  Source code is published across multiple verified GitHub organizations including
  IT Services (ITS-Unibas) and DaSCH (dasch-swiss).
type: Index
