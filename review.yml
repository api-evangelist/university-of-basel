reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      University of Basel has no single central developer portal, but multiple
      real, standards-based public APIs were verified live. The edoc institutional
      repository (DSpace-CRIS 7.6.2) exposes a working DSpace REST API and OAI-PMH
      2.0 interface (both HTTP 200). The DaSCH Service Platform API (DSP-API),
      developed at the university, has public docs, open-source GitHub code, and a
      live service endpoint. The SLSP swisscovery (Alma) SRU interface for the
      Basel zone resolves. GitHub organizations (ITS-Unibas, dasch-swiss) are
      confirmed. No endpoints or properties were fabricated; LinkedIn returned the
      standard 999 anti-bot status and the DSP-API v2 path returned 405 on GET
      (POST/verb required), both of which confirm the resources exist.
    endpoints:
      - url: https://edoc.unibas.ch/server/api
        status: 200
        note: DSpace REST API root; reports DSpace 7.6.2 / cris-2023.02.06.
      - url: https://edoc.unibas.ch/server/oai/request?verb=Identify
        status: 200
        note: OAI-PMH 2.0 Identify; repo "edoc Open Access Repository University of Basel".
      - url: https://docs.dasch.swiss/latest/DSP-API/
